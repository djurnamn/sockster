services:
  sockster:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${SOCKSTER_PORT:-4000}:4000"
    environment:
      - SOCKSTER_PORT=4000
      - SOCKSTER_ORIGIN_URL=${SOCKSTER_ORIGIN_URL:-http://localhost:3000}
      - SOCKSTER_ECHO=${SOCKSTER_ECHO:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
